worker_processes 1;

events { worker_connections 1024; }

http {
    client_max_body_size 200M;

    # Docker's internal DNS — резолвим имена контейнеров динамически
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    30s;

    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 10s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;

        # Auth service
        location /authapp {
            set $upstream http://auth:8001;
            proxy_pass $upstream;
        }

        # Chatbot service — WebSocket
        location /chatbot {
            set $upstream http://chatbot:8002;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }

        # Finance service
        location /balance {
            set $upstream http://finance:8003;
            proxy_pass $upstream;
        }

        location /transactions {
            set $upstream http://finance:8003;
            proxy_pass $upstream;
        }

        location /categories {
            set $upstream http://finance:8003;
            proxy_pass $upstream;
        }

        location /analytics {
            set $upstream http://finance:8003;
            proxy_pass $upstream;
        }

        location /budget {
            set $upstream http://finance:8003;
            proxy_pass $upstream;
        }

        location /goals {
            set $upstream http://finance:8003;
            proxy_pass $upstream;
        }

        # Gamification service
        location /user {
            set $upstream http://gamification:8005;
            proxy_pass $upstream;
        }

        location /lessons {
            set $upstream http://gamification:8005;
            proxy_pass $upstream;
        }

        location /challenges {
            set $upstream http://gamification:8005;
            proxy_pass $upstream;
        }

        location /achievements {
            set $upstream http://gamification:8005;
            proxy_pass $upstream;
        }

        location /market {
            set $upstream http://gamification:8005;
            proxy_pass $upstream;
        }
    }
}
