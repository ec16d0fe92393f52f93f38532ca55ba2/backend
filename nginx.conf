worker_processes 1;

events { worker_connections 1024; }

http {
    client_max_body_size 200M;

    # Таймауты upstream — даём сервису 10с на ответ
    proxy_connect_timeout 5s;
    proxy_send_timeout    10s;
    proxy_read_timeout    30s;

    # При временной недоступности пробуем ещё раз
    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_tries 2;
    proxy_next_upstream_timeout 10s;

    # Общие заголовки для всех upstream
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    server {
        listen 80;

        # Auth service — login, register, refresh, logout, me
        location /authapp {
            proxy_pass http://auth:8001;
        }

        # Chatbot service — WebSocket
        location /chatbot {
            proxy_pass http://chatbot:8002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # Finance service — balance, transactions, categories, analytics, budget, goals
        location /balance {
            proxy_pass http://finance:8003;
        }

        location /transactions {
            proxy_pass http://finance:8003;
        }

        location /categories {
            proxy_pass http://finance:8003;
        }

        location /analytics {
            proxy_pass http://finance:8003;
        }

        location /budget {
            proxy_pass http://finance:8003;
        }

        location /goals {
            proxy_pass http://finance:8003;
        }

        # Gamification service — tree, skills, xp, lessons, challenges, achievements, market
        location /user {
            proxy_pass http://gamification:8005;
        }

        location /lessons {
            proxy_pass http://gamification:8005;
        }

        location /challenges {
            proxy_pass http://gamification:8005;
        }

        location /achievements {
            proxy_pass http://gamification:8005;
        }

        location /market {
            proxy_pass http://gamification:8005;
        }
    }
}
